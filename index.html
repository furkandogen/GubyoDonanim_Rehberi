        // ===== URL ROUTING =====
        const BASE = '/GubyoDonanim_Rehberi';

        function toSlug(str) {
            return str.toLowerCase()
                .replace(/\u0130/g, 'i').replace(/\u0131/g, 'i').replace(/\u011f/g, 'g')
                .replace(/\u00fc/g, 'u').replace(/\u015f/g, 's').replace(/\u00f6/g, 'o').replace(/\u00e7/g, 'c')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function routeFromUrl() {
            const path = window.location.pathname.replace(BASE, '') || '/';
            const parts = path.replace(/^\//, '').split('/').filter(Boolean);
            if (!parts.length) { showHome(false); return; }
            const cat = appData.find(c => toSlug(c.Name) === parts[0]);
            if (!cat) { showHome(false); return; }
            if (parts.length === 1) { showCategory(cat.Id, false); return; }
            const hw = cat.Components.find(h => toSlug(h.Name) === parts[1]);
            if (hw) showDetails(cat.Id, hw.Id, false);
            else showCategory(cat.Id, false);
        }

        window.addEventListener('popstate', routeFromUrl);
        // ===== URL ROUTING END =====

        function showHome(updateUrl = true) {
            window.scrollTo(0, 0);
            if (updateUrl) history.pushState(null, null, BASE + '/');
            let html = `
                <div class="hero-section text-center">
                    <div class="container py-4">
                        <i class="bi bi-pc-display-horizontal display-1 mb-3"></i>
                        <h1 class="hero-title">Bilgisayar Donanım Rehberi</h1>
                        <p class="lead mb-4" style="font-weight: 300; opacity: 0.9;">
                            Geçmişten günümüze bilgisayar teknolojisinin yapı taşlarını keşfedin. Donanım bileşenlerinin teknik özelliklerini, 
                            tarihsel evrimlerini ve modern sistemlerdeki rollerini içeren kapsamlı bilgi rehberi.
                        </p>
                        <a href="#categories" class="btn btn-light btn-lg rounded-pill px-4 fw-bold text-primary shadow-sm">
                            Kategorileri İncele <i class="bi bi-arrow-down-circle ms-2"></i>
                        </a>
                    </div>
                </div>
                <div class="container" id="categories">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold" style="color: var(--maku-navy);">Donanım Kategorileri</h2>
                        <div style="width: 50px; height: 4px; background-color: var(--maku-accent); margin: 0 auto; border-radius: 2px;"></div>
                        <p class="text-muted mt-3">İncelemek istediğiniz donanım kategorisini seçin.</p>
                    </div>
                    <div class="row g-4">
                        ${appData.map((cat, index) => `
                            <div class="col-md-6 col-lg-4">
                                <div class="category-card card p-3" onclick="showCategory(${cat.Id})">
                                    <div class="card-body">
                                        <i class="bi bi-hdd-network category-icon"></i>
                                        <h4 class="card-title fw-bold text-dark mb-3">${cat.Name}</h4>
                                        <span class="badge rounded-pill badge-maku px-3 py-2">
                                            <i class="bi bi-list-ul"></i> ${cat.Components.length} Parça
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('view-container').innerHTML = html;
        }

        function showCategory(catId, updateUrl = true) {
            window.scrollTo(0, 0);
            const category = appData.find(c => c.Id == catId);
            if (!category) return;
            if (updateUrl) history.pushState(null, null, BASE + '/' + toSlug(category.Name));

            let html = `
                <div class="container mt-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb bg-transparent p-0">
                            <li class="breadcrumb-item"><a onclick="showHome()" class="text-decoration-none" style="color: var(--maku-navy);">Ana Sayfa</a></li>
                            <li class="breadcrumb-item active" aria-current="page">${category.Name}</li>
                        </ol>
                    </nav>

                    <div class="detail-header mt-4 mb-5">
                        <h1 class="display-4 fw-bold" style="color: var(--maku-navy); letter-spacing: -1px;">${category.Name}</h1>
                        <p class="text-muted">Bu kategoride toplam ${category.Components.length} adet donanım parçası listelenmektedir.</p>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <table id="hardwareTable" class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Görsel</th>
                                    <th>Model / Ad</th>
                                    <th>Marka</th>
                                    <th>Çıkış Tarihi</th>
                                    <th class="text-center">İşlem</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${category.Components.map(h => `
                                    <tr>
                                        <td width="100">
                                            <img src=".${h.ImageUrl || '/images/no-image.png'}" class="img-fluid rounded" style="max-height: 50px; object-fit: contain;">
                                        </td>
                                        <td><strong>${h.Name}</strong></td>
                                        <td><span class="badge bg-light text-dark border">${h.Brand}</span></td>
                                        <td>${h.ReleaseDate ? new Date(h.ReleaseDate).toLocaleDateString('tr-TR') : '-'}</td>
                                        <td class="text-center">
                                            <button onclick="showDetails(${catId}, ${h.Id})" class="btn btn-outline-primary btn-sm rounded-pill px-3">Detaylar</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById('view-container').innerHTML = html;

            $('#hardwareTable').DataTable({
                "language": {
                    "url": "https://cdn.datatables.net/plug-ins/1.13.6/i18n/tr.json"
                },
                "order": [[1, "asc"]],
                "pageLength": 10
            });
        }

        function showDetails(catId, hardwareId, updateUrl = true) {
            window.scrollTo(0, 0);
            const category = appData.find(c => c.Id == catId);
            const h = category.Components.find(item => item.Id == hardwareId);
            if (!h) return;
            if (updateUrl) history.pushState(null, null, BASE + '/' + toSlug(category.Name) + '/' + toSlug(h.Name));

            const images = [];
            if (h.ImageUrl) images.push('.' + h.ImageUrl);
            if (h.ImageUrl2) images.push('.' + h.ImageUrl2);
            if (h.ImageUrl3) images.push('.' + h.ImageUrl3);

            let imageHtml = '';
            if (images.length === 0) {
                imageHtml = '<i class="bi bi-gpu-card display-1 text-secondary mb-4 opacity-50"></i>';
            } else if (images.length === 1) {
                imageHtml = `<img src="${images[0]}" alt="${h.Name}" class="img-fluid rounded shadow-sm mb-4" style="width: 100%; height: 300px; object-fit: contain;" />`;
            } else {
                imageHtml = `
                    <div id="hardwareCarousel" class="carousel carousel-dark slide mb-4 shadow-sm rounded" data-bs-ride="carousel">
                        <div class="carousel-indicators">
                            ${images.map((img, idx) => `
                                <button type="button" data-bs-target="#hardwareCarousel" data-bs-slide-to="${idx}" class="${idx === 0 ? 'active' : ''}" aria-current="${idx === 0 ? 'true' : 'false'}" aria-label="Slide ${idx+1}"></button>
                            `).join('')}
                        </div>
                        <div class="carousel-inner rounded">
                            ${images.map((img, idx) => `
                                <div class="carousel-item ${idx === 0 ? 'active' : ''}">
                                    <img src="${img}" class="d-block w-100" alt="${h.Name}" style="height: 300px; object-fit: contain;">
                                </div>
                            `).join('')}
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#hardwareCarousel" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#hardwareCarousel" data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        </button>
                    </div>
                `;
            }

            let html = `
                <div class="container mt-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb bg-transparent p-0">
                            <li class="breadcrumb-item"><a onclick="showHome()" class="text-decoration-none" style="color: var(--maku-navy);">Ana Sayfa</a></li>
                            <li class="breadcrumb-item"><a onclick="showCategory(${catId})" class="text-decoration-none" style="color: var(--maku-navy);">${category.Name}</a></li>
                            <li class="breadcrumb-item active" aria-current="page">${h.Name}</li>
                        </ol>
                    </nav>

                    <div class="detail-header mt-4 mb-5">
                        <span class="badge badge-maku mb-2 px-3 py-2 rounded-pill"><i class="bi bi-hdd-rack me-1"></i> ${category.Name}</span>
                        <h1 class="display-3 fw-bold" style="color: var(--maku-navy); letter-spacing: -1px;">${h.Name}</h1>
                        <h4 class="text-muted fw-light mt-2">
                            <i class="bi bi-building me-2"></i>${h.Brand}
                            ${h.ReleaseDate ? `<span class="ms-4"><i class="bi bi-calendar3 me-2"></i>Piyasaya Çıkış: ${new Date(h.ReleaseDate).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })}</span>` : ''}
                        </h4>
                    </div>

                    <div class="row">
                        <div class="col-lg-7">
                            ${h.Differences ? `
                                <div class="info-box border-start border-warning border-4">
                                    <h3><i class="bi bi-lightning-charge-fill text-warning"></i> Farkı Ne? / Eklenen Özellikler</h3>
                                    <p class="fs-5 text-dark mb-0" style="line-height: 1.8;">${h.Differences}</p>
                                </div>
                            ` : '<div class="alert alert-light">Bu ürün için henüz detaylı açıklama eklenmemiş.</div>'}
                        </div>
                        
                        <div class="col-lg-5 text-center mt-4 mt-lg-0">
                            <div class="card border-0 shadow-sm rounded-4 bg-light p-4 h-100 d-flex flex-column justify-content-center align-items-center">
                                ${imageHtml}
                                <h5 class="fw-bold text-muted">${h.Name}</h5>
                                <div class="mt-4 pt-4 border-top w-100">
                                    <span class="d-block text-muted small mb-1">Marka</span>
                                    <strong class="fs-5">${h.Brand}</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-5 mb-5 pb-5">
                        <button onclick="showCategory(${catId})" class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-arrow-left me-2"></i> Geri Dön
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('view-container').innerHTML = html;
            // Carousel init
            const carouselEl = document.querySelector('#hardwareCarousel');
            if (carouselEl) new bootstrap.Carousel(carouselEl);
        }

        // AOS kütüphanesini başlat
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });

        // GitHub Pages SPA Redirect Handler
        (function(l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));

        // Başlangıç: URL'e göre sayfa göster
        routeFromUrl();
    </script>
</body>
</html>
