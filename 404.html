<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>MAKU GUBYO Donanım Rehberi</title>
    <script>
        // GitHub Pages SPA Routing - 404 Redirect Trick
        // Bilinmeyen tüm URL'leri index.html'ye yönlendirir
        var pathSegmentsToKeep = 1; // /GubyoDonanim_Rehberi segmentini koru

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
